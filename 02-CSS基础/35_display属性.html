<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display属性</title>
    <style>
        /* display属性用来设置元素的显示模式 */

        /* block：块级元素，独占一行，可以设置宽高 */
        /* 常见块级元素：div、p、h1-h6、ul、li */
        .box-block {
            display: block;
            width: 200px;
            height: 50px;
            background-color: skyblue;
        }

        /* inline：行内元素，不独占一行，设置宽高无效 */
        /* 常见行内元素：span、a、strong、em */
        .box-inline {
            display: inline;
            /* width和height对行内元素不生效 */
            width: 200px;
            height: 50px;
            background-color: lightgreen;
        }

        /* inline-block：行内块元素，不独占一行，但可以设置宽高 */
        /* 结合了块级和行内的特点 */
        .box-inline-block {
            display: inline-block;
            width: 200px;
            height: 50px;
            background-color: lightcoral;
        }

        /* none：隐藏元素，不占位置 */
        .box-none {
            display: none;
            background-color: gray;
        }
    </style>
</head>
<body>
    <p class="box-block">display: block（独占一行）</p>
    <span class="box-inline">display: inline</span>
    <span class="box-inline">（宽高设置无效）</span>
    <br>
    <div class="box-inline-block">inline-block 1</div>
    <div class="box-inline-block">inline-block 2</div>
    <br>
    <div class="box-none">display: none（你看不到我）</div>
    <p>上面的none元素不占位置，我会顶上来</p>

    <!-- 总结：
        block：独占一行，可设宽高
        inline：不独占一行，宽高无效
        inline-block：不独占一行，可设宽高
        none：隐藏元素，不占空间
    -->
</body>
</html>
