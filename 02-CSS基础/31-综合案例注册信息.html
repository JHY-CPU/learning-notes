<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册表</title>
</head>
<body>
        <h1>注册信息</h1>
        <h2>个人信息</h2>
        <form action="">
        <!-- placeholder就是框框里面的提示字符 -->
        姓名：<input type="text" name="name" id="name" placeholder="请输入真实姓名"><br>
        年龄：<input type="text" name="age" id="age" placeholder="请输入真实年龄"><br>
        密码：<input type="password" name="password" id="password" placeholder="请输入密码"><br>
        确定密码：<input type="password" name="password" id="password" placeholder="请再次输入密码"><br>
        性别：<label ><input type="radio" name="sex" id="sex" value="男">男</label>
              <label ><input type="radio" name="sex" id="sex" value="女">女</label><br>
        最佳城市：
        <select>
            <option value="北京">北京</option>
            <option value="上海">上海</option>
            <option value="广州">广州</option>
            <option value="深圳">深圳</option>
            <option value="杭州">杭州</option>
            <option value="成都">成都</option>
            <option value="武汉">武汉</option>
            <option value="西安">西安</option>
        </select>
        <br>
        <h2>教育经历</h2>
        最高学历:
        <select>
            <option >高中</option>
            <option >大专</option>
            <option >本科</option>
            <option >硕士</option>
            <option >博士</option>
        </select>
        <br>
        学校：<input type="text" name="school" id="school" placeholder="请输入学校"><br>
        专业：<input type="text" name="major" id="major" placeholder="请输入专业"><br>
        学历：<input type="text" name="degree" id="degree" placeholder="请输入学历"><br>
        在校时间：
        <select>
            <option >2015</option>
            <option >2016</option>
            <option >2017</option>
            <option >2018</option>
            <option >2019</option>
            <option >2020</option>
            <option >2021</option>
        </select>
        <br>
        <h2>工作经历</h2>
        公司名称：<input type="text" name="company" id="company" placeholder="请输入公司名称"><br>
        <br>
        工作描述：<input type="text" name="work" id="work" placeholder="请输入工作描述"><br>
        <br>
        <label> <input type="checkbox">已阅读并同意协议</label>
        <br>
        <ul>
            <li><a href="">用户协议</a></li>
            <li><a href="">隐私政策</a></li>
        </ul>
        <br><br><br>
        <button>提交</button>
        <button type="reset">重置</button>
    </form>
</body>
</html>
