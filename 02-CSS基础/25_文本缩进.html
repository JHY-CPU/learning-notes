<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本缩进</title>
    <style>
        p{
            text-indent: 2em;
            /* 几个em就是空几格 */
            /* 文本缩进的单位可以是数字 也可以是百分比 也可以是长度 */
            /* 文本缩进的百分比是相对于字体大小的 */
            /* 文本缩进的长度是相对于父元素的宽度的 */
            /* 文本缩进的单位可以是数字 也可以是百分比 也可以是长度 */
            /* 文本缩进的百分比是相对于字体大小的 */ 
        }
    </style>
</head>
<body>
    <p>
        科技：重塑未来的磅礴力量
        在当今这个瞬息万变的时代，科技无疑是推动社会进步的核心驱动力，以前所未有的速度和广度重塑着我们的世界，深刻影响着人类生活的方方面面。
    </p>
</body>
</html>
