<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字体修饰属性</title>
    <style>
        .f1 { font-size: 12px; }
        .f2 { font-size: 16px; }
        .f3 { font-size: 24px; }
        .f4 { font-size: 36px; }
        .bold { font-weight: bold; }
        .light { font-weight: lighter; }
        .italic { font-style: italic; }
        .underline { text-decoration: underline; }
        .line-through { text-decoration: line-through; }
    </style>
</head>
<body>
    <h2>字体大小 font-size</h2>
    <p class="f1">12px 大小的文字</p>
    <p class="f2">16px 大小的文字</p>
    <p class="f3">24px 大小的文字</p>
    <p class="f4">36px 大小的文字</p>
    <hr>
    <h2>字体粗细 font-weight / 样式 font-style</h2>
    <p><span class="bold">这是加粗文字</span>，<span class="light">这是细体文字</span>，<span class="italic">这是斜体文字</span></p>
    <hr>
    <h2>文字修饰 text-decoration</h2>
    <p><span class="underline">下划线</span>，<span class="line-through">删除线</span></p>
</body>
</html>
