<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字体粗细</title>
    <style>
        .p1{
            font-weight: 100;
        }
        .p2{
            font-weight: 200;
        }
        .p3{
            font-weight: 300;
        }
        .p4{
            font-weight: 900;
        }
    </style>
</head>
<body>
    <div class="p1">1</div>
    <div class="p2">2</div>
    <div class="p3">3</div>
    <div class="p4">4</div>
</body>
</html>
