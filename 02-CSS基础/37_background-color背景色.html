<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>background-color背景色</title>
    <style>
        /* background-color设置元素的背景色 */
        /* 支持的取值：颜色名、十六进制、rgb、rgba */

        /* 颜色名 */
        .box1 {
            width: 300px;
            height: 60px;
            background-color: red;
        }

        /* 十六进制 */
        .box2 {
            width: 300px;
            height: 60px;
            background-color: #ff6600;
        }

        /* rgb */
        .box3 {
            width: 300px;
            height: 60px;
            background-color: rgb(0, 128, 255);
        }

        /* rgba（a是透明度，0完全透明，1完全不透明） */
        .box4 {
            width: 300px;
            height: 60px;
            background-color: rgba(0, 0, 0, 0.3);
        }

        /* 背景色会填充padding区域，但不会填充margin区域 */
        .box5 {
            width: 200px;
            height: 80px;
            padding: 20px;
            margin: 20px;
            background-color: lightgreen;
            border: 2px solid black;
        }

        /* body也可以设置背景色 */
        body {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
    <div class="box1">颜色名：red</div>
    <div class="box2">十六进制：#ff6600</div>
    <div class="box3">rgb：rgb(0,128,255)</div>
    <div class="box4">rgba半透明：rgba(0,0,0,0.3)</div>
    <div class="box5">背景色包含padding区域</div>

    <!-- 总结：
        background-color支持：颜色名、#十六进制、rgb()、rgba()
        rgba的a控制透明度，0透明，1不透明
        背景色会填充内容区+padding区，不会填充margin区
    -->
</body>
</html>
