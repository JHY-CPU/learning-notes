<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
               font:italic bold 30px/2 宋体; 
        }
        /* font属性必须写字号和字体，否则属性不生效 */
        /* font属性的顺序是：font-style font-weight font-size/line-height font-family */

    </style>
</head>
<body>
    <div>测试font属性</div>
</body>
</html>
