<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标签选择器</title>
    <style>
        .red{
            color: rgb(255, 0, 0);
        } 
        .size{
            font-size: 40px; 
        }
    </style>
    <!-- 选择的同名的标签都会收到改变，无法完成差异化。 -->
</head>
<body>
    <P class="red size">这是标签选择器</P>
    <p>471872</p>
    <!-- 一个类选择器可以用多个标签 -->
</body>
</html>
