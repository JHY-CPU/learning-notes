<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:hover伪类</title>
    <style>
        /* :hover 伪类选择器，鼠标悬停时生效 */

        /* 基本用法：鼠标移上去变色 */
        .box1 {
            width: 200px;
            height: 60px;
            background-color: skyblue;
            text-align: center;
            line-height: 60px;
        }
        .box1:hover {
            background-color: lightcoral;
        }

        /* 鼠标悬停时改变文字颜色 */
        .link {
            font-size: 18px;
            color: gray;
        }
        .link:hover {
            color: red;
            /* cursor改变鼠标样式，pointer是小手 */
            cursor: pointer;
        }

        /* 鼠标悬停时改变大小 */
        .box2 {
            width: 150px;
            height: 150px;
            background-color: lightgreen;
            /* transition让变化更平滑，后面会详细学 */
            transition: all 0.3s;
        }
        .box2:hover {
            width: 200px;
            height: 200px;
        }

        /* hover可以用于任何元素，不只是链接 */
        .box3 {
            width: 200px;
            height: 60px;
            background-color: plum;
            text-align: center;
            line-height: 60px;
            /* 鼠标悬停时显示边框 */
            border: 2px solid transparent;
        }
        .box3:hover {
            border-color: black;
        }
    </style>
</head>
<body>
    <div class="box1">鼠标悬停变色</div>
    <br>
    <span class="link">鼠标悬停变红</span>
    <br><br>
    <div class="box2">鼠标悬停放大</div>
    <br>
    <div class="box3">鼠标悬停显示边框</div>

    <!-- 总结：
        语法：选择器:hover { 样式 }
        鼠标悬停时才生效的样式
        常见搭配：改变颜色、cursor:pointer（小手）、改变大小
        hover可以用于任何元素，不只是a标签
    -->
</body>
</html>
