<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒模型基础</title>
    <style>
        /* 盒模型：每个HTML元素都可以看成一个盒子 */
        /* 从内到外：content -> padding -> border -> margin */

        /* content 内容区：放文字、图片等内容 */
        /* padding 内边距：内容和边框之间的距离 */
        /* border 边框：盒子的边 */
        /* margin 外边距：盒子和盒子之间的距离 */

        .box {
            width: 200px;          /* 内容区宽度 */
            height: 100px;         /* 内容区高度 */
            padding: 20px;         /* 四个方向内边距都是20px */
            border: 5px solid black; /* 5px实线边框 */
            margin: 30px;          /* 四个方向外边距都是30px */
            background-color: skyblue;
        }

        /* padding可以分开写 */
        .box2 {
            width: 200px;
            height: 100px;
            background-color: lightgreen;
            border: 3px solid gray;

            /* 上 右 下 左（顺时针方向） */
            padding: 10px 20px 30px 40px;

            /* 也可以只写两个：上下 左右 */
            /* padding: 10px 20px; */

            /* 也可以写一个：四个方向相同 */
            /* padding: 15px; */
        }

        /* margin也可以分开写 */
        .box3 {
            width: 200px;
            height: 100px;
            background-color: lightcoral;
            border: 3px solid black;
            padding: 10px;
            /* margin简写规则和padding一样 */
            margin: 10px 20px 30px 40px;
        }

        /* 块级元素水平居中：margin: 0 auto */
        .center-box {
            width: 300px;
            height: 80px;
            background-color: plum;
            /* 上下0，左右自动（水平居中） */
            margin: 0 auto;
            text-align: center;
            line-height: 80px;
        }
    </style>
</head>
<body>
    <div class="box">盒模型基本结构</div>
    <div class="box2">padding分开写：上10px 右20px 下30px 左40px</div>
    <div class="box3">margin分开写</div>
    <div class="center-box">margin: 0 auto 水平居中</div>

    <!-- 总结：
        盒模型从内到外：content -> padding -> border -> margin
        width/height设置的是内容区的大小
        padding和margin支持简写：
            四个值：上 右 下 左
            两个值：上下 左右
            一个值：四个方向相同
        块级元素水平居中：margin: 0 auto（需要设width）
    -->
</body>
</html>
