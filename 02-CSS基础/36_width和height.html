<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>width和height</title>
    <style>
        /* width：设置元素的宽度 */
        /* height：设置元素的高度 */
        /* 默认值都是auto，由内容撑开 */

        /* 块级元素：宽度默认占满父元素，高度由内容撑开 */
        .box1 {
            background-color: skyblue;
            /* 不设width时，默认占满一行 */
        }

        .box2 {
            width: 300px;
            height: 100px;
            background-color: lightgreen;
        }

        /* 行内元素：设置宽高无效，宽高由内容决定 */
        .box3 {
            /* 这些设置对span（行内元素）不生效 */
            width: 300px;
            height: 100px;
            background-color: lightcoral;
        }

        /* 如果需要行内元素能设置宽高，可以改成inline-block */
        .box4 {
            display: inline-block;
            width: 300px;
            height: 100px;
            background-color: plum;
        }
    </style>
</head>
<body>
    <div class="box1">块级元素不设宽度，自动占满一行</div>
    <div class="box2">块级元素设了width:300px和height:100px</div>
    <br>
    <span class="box3">行内元素设宽高无效，由内容撑开</span>
    <br>
    <span class="box4">改成inline-block后，宽高生效了</span>

    <!-- 总结：
        块级元素：默认width:auto（占满父元素），height:auto（由内容撑开）
        行内元素：设置width和height无效
        想让行内元素设置宽高，需要先改成inline-block
    -->
</body>
</html>
