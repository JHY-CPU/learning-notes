<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体育新闻</title>
    <style>
        .news-list {
            width: 600px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .news-list h2 {
            color: #333;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
        }
        .news-list ul {
            list-style: none;
            padding: 0;
        }
        .news-list li {
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }
        .news-list li:last-child {
            border-bottom: none;
        }
        .news-list a {
            color: #333;
            text-decoration: none;
        }
        .news-list a:hover {
            color: #e74c3c;
        }
        .tag {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="news-list">
        <h2>⚽ 体育新闻</h2>
        <ul>
            <li><span class="tag">热门</span><a href="#">CBA联赛：广东队逆转胜辽宁队</a></li>
            <li><span class="tag">最新</span><a href="#">NBA季后赛：勇士队晋级第二轮</a></li>
            <li><span class="tag">英超</span><a href="#">曼联客场3-1逆转取胜</a></li>
            <li><span class="tag">中超</span><a href="#">上海海港2-0战胜山东泰山</a></li>
            <li><span class="tag">网球</span><a href="#">法网公开赛：中国选手创最佳战绩</a></li>
        </ul>
    </div>
</body>
</html>
