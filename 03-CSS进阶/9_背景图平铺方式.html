<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平铺方式</title>
    <style>
        div {
            background-repeat:  no-repeat; 
        }
    </style>
</head>
<body>
    <div>
            1. 背景图平铺方式：background-repeat: repeat;
            2. 背景图不平铺：background-repeat: no-repeat;
            3. 背景图水平平铺：background-repeat: repeat-x;   
            4. 背景图垂直平铺：background-repeat: repeat-y;
            5. 背景图不平铺，但是会缩放：background-repeat: space;
            6. 背景图不平铺，但是会拉伸：background-repeat: round;
            7. 背景图不平铺，但是会平铺：background-repeat: repeat;  
    </div>
</body>
</html>
