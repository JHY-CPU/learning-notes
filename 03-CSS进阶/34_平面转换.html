<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体验平面-平移</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: red; 
            margin: 100px;
            transition: all 2s ;
        }
        div:hover{
            transform: rotate(180deg); 
        }
    </style>
</head>
<body>
    <div></div>
</body>
</html>
