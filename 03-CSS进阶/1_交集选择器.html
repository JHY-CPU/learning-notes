<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交集选择器</title>
    <style>
        p.box{
            color: red;
        }
        /* 既是p标签，又是box类 */
    </style>
</head>
<body>
   <p class="box">标签,使用了类选择器box</p>
   <p>p标签</p>
   <div class="box">div标签,使用了类选择器</div>
</body>
</html>
