<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪元素选择器</title>
    <style>
        /* 伪元素选择器 */
        /* 1. 伪元素选择器的作用：用于向某些元素的特定部分添加样式 */
        /* 2. 伪元素选择器的语法： */
        /* 选择器::伪元素{属性：属性值；} */
        /* 3. 伪元素选择器的分类： */
        /* 1. 双冒号 :: 伪元素选择器 */
        /* 2. 单冒号 : 伪类选择器 */
        /* 4. 伪元素选择器的使用： */
        /* 1. 伪元素选择器的使用必须配合伪类选择器使用 */
        /* 2. 伪元素选择器的使用必须配合元素选择器使用 */
        /* 3. 伪元素选择器的使用必须配合类选择器使用 */
        /* 5. 伪元素选择器的使用： */
        /* 1. 第一个字母 */
        div::before{
            content: "你是傻逼，我是你爹";
        }
    </style>     
</head>
<body>
    <div>你是傻逼，我是你爹</div>
</body>
</html>
