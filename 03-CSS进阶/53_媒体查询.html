<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>媒体查询重温</title>
    <style>
        /* 屏幕宽度小于等于1280网页背景是绿色 */
        @media (max-width: 1280px) {
            body{
                background-color: green;
            } 
        }
        /* 屏幕宽度大于等于450网页背景是红色 */
        @media (min-width: 450px) {
            body{
                background-color: red;
            }
        }
        /* 媒体查询有书写顺序若是从小到大就用min-width，若是从大到小就用max-width。 */
    </style>
</head>
<body>
    
</body>
</html>
