<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹性伸缩比</title>
    <style>
        /* 默认情况下，主轴靠内容撑开，侧轴默认拉伸 */
        .box{
            width: 500px;
            height: 300px;
            border: 1px solid red;
            display: flex;
        }
        .box div:nth-child(1){
            width: 100px;
            background-color: pink;
        }
       .box div:nth-child(2){
                  flex: 1; 
                  background-color: pink;
       }
       .box div:nth-child(3){
                  flex: 2; 
                  background-color: pink;
       }
    </style>
</head>
<body>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
