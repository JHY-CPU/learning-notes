<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字体图标</title>
    <!-- 使用Font Awesome字体图标库（CDN引入） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 看着是图，实际上是文字 */
        .iconfont {
            font-family: "Font Awesome 6 Free" !important;
            font-size: 48px;
            font-style: normal;
            color: #3498db;
        }
        .icon-box {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 50px;
        }
        .icon-item {
            text-align: center;
        }
        .icon-item p {
            margin-top: 8px;
            color: #666;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center;">字体图标示例（Font Awesome）</h2>
    <div class="icon-box">
        <div class="icon-item">
            <i class="fa-solid fa-house" style="font-size:48px;color:#e74c3c;"></i>
            <p>首页</p>
        </div>
        <div class="icon-item">
            <i class="fa-solid fa-user" style="font-size:48px;color:#3498db;"></i>
            <p>用户</p>
        </div>
        <div class="icon-item">
            <i class="fa-solid fa-star" style="font-size:48px;color:#f39c12;"></i>
            <p>收藏</p>
        </div>
        <div class="icon-item">
            <i class="fa-solid fa-gear" style="font-size:48px;color:#2ecc71;"></i>
            <p>设置</p>
        </div>
    </div>
    <p style="text-align:center;color:#999;margin-top:30px;">看着是图，实际上是字体文字，可以随意改变大小和颜色</p>
</body>
</html>
