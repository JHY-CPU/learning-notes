<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择器的优先级</title>
    <style>
        /* 选择器优先级低的先显示，高的后显示并覆盖 */
        /* 公式：通配符选择器 < 标签选择器 < 类选择器 < id选择器 < 行内样式 < !important */
        /* 选中标签范围越大，优先级越低 */

        * {
            color: gray;        /* 通配符 - 优先级最低 */
        }
        div {
            color: orange;      /* 标签选择器 */
        }
        .myclass {
            color: blue;        /* 类选择器 */
        }
        #myid {
            color: green;       /* id选择器 */
        }
    </style>
</head>
<body>
    <div>这是div标签（标签选择器 → 橙色）</div>
    <div class="myclass">这是div.myclass（类选择器 → 蓝色）</div>
    <div class="myclass" id="myid">这是div#myid（id选择器 → 绿色）</div>
    <div class="myclass" id="myid" style="color:red;">行内样式 → 红色，优先级最高</div>
</body>
</html>
