<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS特性-层叠性</title>
    <style>
        /* 层叠性：后面的属性会覆盖前面的属性 */
        /* 不同的属性都会生效 */
        p {
            color: red;
            font-size: 20px;
        }
        p {
            color: blue;  /* 覆盖上面的 red */
            /* font-size 没有被覆盖，依然生效 */
        }
    </style>
</head>
<body>
    <p>这段文字应该是蓝色的（覆盖），字号20px（保留）</p>
    <hr>
    <p style="color: green;">
        行内样式优先级更高，所以是绿色
    </p>
</body>
</html>
