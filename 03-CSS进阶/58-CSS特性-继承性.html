<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>继承性</title>
    <style>
        body{
            font-size: 14px;
            color: #000;
        }
    </style>
</head>
<body>
    <div>这是div标签</div>
    <p>这是p标签</p>
    <span>这是span标签</span>
    <a href="#">这是a标签</a>
    <!-- 若是标签有自己的特性就不继承 -->
</body>
</html>
