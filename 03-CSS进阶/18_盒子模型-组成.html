<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盒子模型</title>
    <style>
        /* 盒子模型 */
        /* 1. 盒子模型的作用：用于计算一个元素的大小 */
        /* 2. 盒子模型的分类： */
        /* 1. 标准盒子模型：width = content */
        /* 2. 怪异盒子模型：width = content + padding + border */
        /* 3. 盒子模型的使用： */
        div{
            width: 200px;
            height: 200px;
            background-color: red;
            /* 1. 标准盒子模型 */
            /* box-sizing: content-box; */
            /* 2. 怪异盒子模型 */
            box-sizing: border-box;
            padding-top: 20px;
            padding-right: 20px;
            padding-bottom: 20px;
            padding-left: 20px;
            /* padding是内边距，边框是边框，外边距是外边距 */ 
            /* 四值写法：上右下左 */
            /* 三值写法：上 左右 下 */
            /* 二值写法：上下 左右 */
            /* 一值写法：上下左右 */
            border-top: 10px solid black;
            /* 边框线粗细 实线  边框线颜色 */
            border-bottom: 10px solid black;
            /* 边框线粗细 实线  边框线颜色 */
            /* dashed 虚线 */
            /* border连一个位置表示出现边框线的地方 */
            /* 这个是边框，盒子边框的宽度 */
            margin: 10px;
            /* 外边距出现在盒子外面 */   
            /* 盒子模型尺寸计算：
            默认情况下：
            盒子尺寸=内容尺寸＋内边距尺寸＋边框尺寸 */
            box-sizing: border-box;
            /* 这个是內减模师，不用自己算 */
        }
    </style>
</head>
<body>
    <div>标签</div>
</body>
</html>
