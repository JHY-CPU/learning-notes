<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐藏效果</title>
    <style>
        *{
            margin: 0;
            padding: 0; 
        }
        .left{
            width: 200px;
            height: 200px;
            background-color: pink;
        }
        @media (max-width: 600px) {
            .left{
                display: none;
            }
        }
        /* 网页宽度小于600就会隐藏 */
    </style>
</head>
<body>
    <div class="left"></div>
    <p style="text-align:center;margin-top:20px;color:#666;">网页宽度小于600px时，粉色方块会隐藏</p>
</body>
</html>
