<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rem的简介和基本使用</title>
    <style>
        /* rem（root em）是相对于根元素（html）的字体大小 */
        /* 1rem = html的font-size值（默认16px） */
        html {
            font-size: 20px;  /* 设置1rem = 20px */
        }
        .rem-demo {
            width: 10rem;     /* 200px */
            height: 5rem;     /* 100px */
            background-color: #3498db;
            margin: 2rem auto;
            border-radius: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.2rem;
        }
        p {
            text-align: center;
            font-size: 1rem;  /* 20px */
            color: #666;
        }
        .small {
            font-size: 0.8rem; /* 16px */
        }
    </style>
</head>
<body>
    <div class="rem-demo">10rem × 5rem</div>
    <p>当前1rem = 20px (html的font-size)</p>
    <p class="small">rem适配常用于移动端开发</p>
</body>
</html>
