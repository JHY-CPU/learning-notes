<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素溢出</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            border: 1px solid red;
            /* overflow: hidden; */
            /* overflow: scroll; */
            /* overflow: auto; */
        }
    </style>
</head>
<body>
    <div>
        1. 元素溢出：指的是元素的内容超出了元素的尺寸，导致元素的内容被隐藏。
        2. 元素溢出的分类：
        1. 水平溢出：指的是元素的内容超出了元素的宽度，导致元素的内容被隐藏。
        2. 垂直溢出：指的是元素的内容超出了元素的高度，导致元素的内容被隐藏。
    </div>    
</body>
</html>
