<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rem适配</title>
    <style>
        *{
            margin: 0;
            padding: 0; 
        }
       
        @media(width:400px){ 
            html{
                font-size: 40px;
            }
        }
        @media(width:366px){
            html{
                font-size: 36.6px;
            }
        }
        @media(width:375px){
            html{
                font-size: 37.5px;  
            }
        }
        .box{
           width: 3rem;   
           height: 3rem;
           background-color: red;
        }
    </style>
</head>
<body>
    <div class="box">

    </div>
    
</body>
</html>
