<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            background-color: pink;
            position: relative;
            top: 100px;
            left: 100px;
            z-index: 1;
        }
        .box{
            width: 200px;
            background-color: red;
            position: absolute;
            top: 50px;
            left: 50px;
            z-index: 2;

        }
    </style>
</head>
<body>
    <!-- z-index: 作用：设置定位元素的层级顺序，改变定位元素的显示顺序 -->
    <!-- 数字越大顺序越靠前 -->
    <div>div标签</div>
    <div class="box">box标签</div>
</body>
</html>
