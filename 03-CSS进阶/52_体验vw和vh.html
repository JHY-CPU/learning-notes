<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体验vw和vh</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 50vh;
            height: 30vh;
            background-color: pink;
        }
        /* vw单位大小等于视口宽度的百分之一 */
        /* vh单位大小等于视口高度的百分之一 */
        /* vw单位的尺寸等于px单位数值除以视口宽度的百分之一
        vh单位的尺寸等于px单位数值除以视口高度的百分之一 */
        
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
