<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS精灵</title>
    <style>
        /* CSS精灵：将多张小图合并成一张大图，通过background-position来显示不同部分 */
        .box {
            width: 600px;
            height: 200px;
            border: 1px solid #ccc;
            margin: 50px auto;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .icon {
            width: 50px;
            height: 50px;
            background-image: url(./yanyun.jpg);
            background-repeat: no-repeat;
            /* 通过background-position来定位显示不同图标 */
            /* 实际项目中会用一张整合的精灵图，这里只做概念演示 */
        }
    </style>
</head>
<body>
    <h2 style="text-align:center;">CSS精灵技术</h2>
    <p style="text-align:center;">可以实现各种图片的添加，还可以减少对服务器的请求次数</p>
    <div class="box">
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
    </div>
</body>
</html>
