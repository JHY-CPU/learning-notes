<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>版心居中</title>
    <style>
        /* margin: 0 auto 就是版心居中 */
        .container {
            width: 1000px;
            height: 300px;
            background-color: #f0f0f0;
            margin: 50px auto;   /* 水平居中 */
            text-align: center;
            line-height: 300px;
            font-size: 24px;
            border: 1px solid #ccc;
        }
        .inner {
            width: 600px;
            height: 100px;
            background-color: #3498db;
            color: #fff;
            margin: 0 auto;      /* 内层盒子也居中 */
            line-height: 100px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="inner">版心居中（水平居中）</div>
    </div>
</body>
</html>
