<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浮动的基本使用</title>
    <style>
        .one {
        width: 200px;
        height: 200px;
        background-color: red; 
        float: left;
        }
        .twe {
        width: 200px;
        height: 200px;
        background-color: blue; 
        float: left;
        }
        /* 特点：顶对齐，具备行内块特点 */
        /* 清除浮动用clear：both */
    </style>
</head>
<body>
    <div class="one">这是第一个</div>
    <div class="twe">这是第二个</div>
</body>
</html>
