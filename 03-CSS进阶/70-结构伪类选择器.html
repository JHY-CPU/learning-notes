<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结构伪类选择器</title>
    <style>
        /* 选择第一个li */
        li:first-child{
            color: red;
        }
        /* 选择最后一个li */
        li:last-child{
            color: green;
        }
        /* 选择第n个li */
        li:nth-child(3){
            color: blue;
        }
        /* nth公式，几的倍数就选择几n */
        /* 找到5以后的就是5＋n */
        /* 找到5以前的就是-n＋5 */
        /* 奇数标签就是2n加一 */
        /* 偶数标签就是2n */
    </style>
</head>
<body>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
    </ul>
    
</body>
</html>
