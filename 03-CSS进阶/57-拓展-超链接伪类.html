<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拓展超链接伪类</title>
    <style>
        a:link{
            color: rgb(255, 0, 0);
        }
        a:visited{
            color: rgb(0, 255, 0);
        }
        a:hover{
            color: rgb(0, 0, 255);
        }
        a:active{
            color: rgb(255, 0, 255); 
        }
    </style>
</head>
<body>
    <a href="#">a标签测试伪类</a>
</body>
</html>
