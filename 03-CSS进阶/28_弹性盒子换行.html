<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹性盒子换行</title>
    <style>
        .box {
            width: 300px;
            height: 300px;
            border: 2px solid #333;
            margin: 50px auto;
            display: flex;
            flex-wrap: wrap;        /* 允许换行 */
            /* flex-wrap: nowrap;    不换行（默认） */
            /* flex-wrap: wrap-reverse; 反向换行 */
            gap: 10px;
            padding: 10px;
        }
        .box div {
            width: 80px;
            height: 80px;
            background-color: #3498db;
            color: #fff;
            text-align: center;
            line-height: 80px;
            font-size: 20px;
        }
        .no-wrap {
            width: 300px;
            height: 80px;
            border: 2px solid #e74c3c;
            margin: 20px auto;
            display: flex;
            flex-wrap: nowrap;      /* 不换行，子元素会被压缩 */
            padding: 10px;
        }
        .no-wrap div {
            min-width: 80px;
            height: 60px;
            background-color: #e74c3c;
            color: #fff;
            text-align: center;
            line-height: 60px;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <h3 style="text-align:center;">flex-wrap: wrap（换行）</h3>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>
    <h3 style="text-align:center;">flex-wrap: nowrap（不换行）</h3>
    <div class="no-wrap">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
</body>
</html>
