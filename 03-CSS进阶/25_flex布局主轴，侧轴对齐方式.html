<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex布局-主轴对齐方式，侧轴对齐方式</title>
    <style>
        .box{
            display: flex;
            /* justify-content: flex-start; */
            /* justify-content: flex-end; */
            /* justify-content: center; 居中*/
            /* justify-content: space-around; */
            /* justify-content: space-between; 父级剩余空间分配，弹性盒子之间的距离相等 */
            /* 这些设置可以调整弹性盒子的主轴对齐方式 */
            /* 显示侧轴效果，高必须注释掉 */
            /* align-items: flex-start; */
            /* align-items: flex-end; */
            /* align-items: center; */
            /* align-items: stretch; 拉伸 */
            /* 这些设置可以调整弹性盒子的侧轴对齐方式，没有针对性，统一设置 */
            width: 500px;
            height: 300px; 
        }
        .box div{
            width: 100px;
            height: 100px;
            align-self: auto;
            /* 这个是针对个别，设置侧轴对齐 */ 

        }
    </style>
</head>
<body>
    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
</body>
</html>
