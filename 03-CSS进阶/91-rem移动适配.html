<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rem移动适配</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        /* rem适配：根据根元素（html）的font-size来确定大小 */
        html {
            font-size: 16px;  /* 默认1rem = 16px */
        }
        .box {
            width: 10rem;     /* 160px */
            height: 10rem;    /* 160px */
            background-color: #3498db;
            margin: 2rem auto;
            border-radius: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5rem;
        }
        .text {
            font-size: 1rem;  /* 16px */
            text-align: center;
            margin: 1rem;
            color: #666;
        }
        /* 媒体查询：不同屏幕尺寸下改变根字号 */
        @media (max-width: 375px) {
            html { font-size: 14px; }
        }
        @media (min-width: 768px) {
            html { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="box">10rem</div>
    <p class="text">rem单位相对于html根元素的font-size</p>
    <p class="text">改变窗口大小，box大小会响应变化</p>
</body>
</html>
