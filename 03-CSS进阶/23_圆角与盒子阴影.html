<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆角与盒子阴影</title>
    <style>
            /* 作用：设置元素的外边框为圆角
            属性名:border-radius
            属性值：
                数字加px/百分比
                四个角可以分别赋值
                从左上角开始，顺时针赋值，没有复制的角按照对角的取值
                最大值是百分之50,超过后没有效果
            常见应用：胶囊状盒子，把圆角属性设置成高度的一半     */
            /* 作用：设置元素的阴影效果
            属性名：box-shadow
            属性值：
                水平阴影的位置  垂直阴影的位置  阴影的模糊程度  阴影的大小  阴影的颜色
                可以设置多个，用逗号隔开
                可以设置负值
            常见应用：给盒子添加阴影效果 */
            /* 2px 2px 2px 2px red;
            2px 2px 2px 2px rgba(0,0,0,0.5);
            2px 2px 2px 2px #000;
            2px 2px 2px 2px #000000; */
        
    </style>
</head>
<body>
    <div>f</div>
    <div>i</div>
</body>
</html>
