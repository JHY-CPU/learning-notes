<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定位</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        div{
               position: relative;
               /* 这是相对定位 */
               /* 参照物是自己原来的位置 */
               top: 100px;
               left: 100px; 

        }
        div{
            position: absolute;
            /* 这是绝对定位 */
            /* 参照物：先找最近的定位祖先元素，要是祖先元素都没有定位，参照浏览器可视区改 
            位置 */
            top: 100px;
            left: 100px;
            /* transform：translate（-50%，-50%）方便，就是自己宽高的50% */
            /*                       向左    向上 */
        }
        div{
            position: fixed;
            /* 这是固定定位 */
            /* 参照物：浏览器窗口 */ 
            /* 具备行内快特点 */
        }
    </style>
</head>
<body>
    
</body>
</html>
