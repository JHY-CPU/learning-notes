<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <video src="" controls autoplay muted>
        <!-- 视频标签 -->
        <!-- controls是控制栏 -->
        <!-- autoplay是自动播放 -->
        <!-- muted是静音 -->
        <!-- 视频标签应用场景：视频网站，视频播放 -->
    </video>
    <audio src="" controls autoplay muted>
        <!-- 音频标签 -->
        <!-- controls是控制栏 -->
    </audio>
</body>
</html>
