<pre>// 11-线段树基础 (Segment Tree Basics)

  <button onclick="runDemo()">运行演示</button>

<script>
function runDemo(){function build(arr,idx,l,r){if(l===r){tree[idx]=arr[l];return}const m=l+((r-l)>>1);build(arr,2*idx,l,m);build(arr,2*idx+1,m+1,r);tree[idx]=tree[2*idx]+tree[2*idx+1]}document.getElementById('result').textContent='线段树: 区间查询/点更新 O(log n)'}
</script>
