<div class="card">
  <h2>15-树状数组基础 (Fenwick Tree Basics)</h2>

<pre>// 15-树状数组基础 (Fenwick Tree Basics)
// 数组维护前缀和, 单点更新O(log n)
// 详细实现见代码注释</pre>
  <button onclick="runDemo()">运行演示</button>
  <div id="result"></div>
</div>
<script>
function runDemo(){class BIT{constructor(n){this.n=n;this.t=new Array(n+1).fill(0)}add(i,v){while(i<=this.n){this.t[i]+=v;i+=i&-i}}sum(i){let s=0;while(i){s+=this.t[i];i-=i&-i}return s}}const bit=new BIT(10);bit.add(1,5);bit.add(3,6);document.getElementById('result').textContent='树状数组: sum(3)='+bit.sum(3)}
</script>
