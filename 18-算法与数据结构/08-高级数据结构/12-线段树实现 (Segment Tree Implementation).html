<body>
<div class="card">
  <h2>12-线段树实现 (Segment Tree Implementation)</h2>
  <p>建树, 查询, 点更新的递归实现</p>
</div>
<div class="card">
  <h2>12-线段树实现 (Segment Tree Implementation)</h2>
  <div class="code">12-线段树实现 (Segment Tree Implementation) 概念讲解。建树, 查询, 点更新的递归实现</div>
<pre>// 12-线段树实现 (Segment Tree Implementation)
// 建树, 查询, 点更新的递归实现
// 详细实现见代码注释</pre>
  <button onclick="runDemo()">运行演示</button>
  <div id="result"></div>
</div>
<script>
function runDemo(){class SegTree{constructor(n){this.n=n;this.t=new Array(4*n).fill(0)}build(arr,idx,l,r){if(l===r){this.t[idx]=arr[l];return}const m=l+((r-l)>>1);this.build(arr,idx*2,l,m);this.build(arr,idx*2+1,m+1,r);this.t[idx]=this.t[idx*2]+this.t[idx*2+1]}query(idx,l,r,ql,qr){if(ql>r||qr<l)return 0;if(ql<=l&&r<=qr)return this.t[idx];const m=l+((r-l)>>1);return this.query(idx*2,l,m,ql,qr)+this.query(idx*2+1,m+1,r,ql,qr)}}document.getElementById('result').textContent='线段树实现: O(log n) 区间查询'}
</script>
