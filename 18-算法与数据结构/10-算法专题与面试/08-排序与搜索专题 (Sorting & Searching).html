<pre>// 08-排序与搜索专题 (Sorting & Searching)

  <button onclick="runDemo()">运行演示</button>

</div>
<script>
function runDemo(){function bs(arr,t){let l=0,r=arr.length-1;while(l<=r){const m=Math.floor((l+r)/2);if(arr[m]===t)return m;if(arr[m]<t)l=m+1;else r=m-1}return -1}document.getElementById('result').textContent='二分查找: '+bs([1,3,5,7,9,11],7)}
</script>
