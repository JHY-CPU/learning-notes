<body>
<div class="card">
  <h2>28-经典问题精讲-最大子数组 (Maximum Subarray Deep Dive)</h2>

</div>
<div class="card">
  <h2>28-经典问题精讲-最大子数组 (Maximum Subarray Deep Dive)</h2>
  <div class="code">28-经典问题精讲-最大子数组 (Maximum Subarray Deep Dive) 概念讲解。Kadane算法, 分治, 前缀和</div>
<pre>// 28-经典问题精讲-最大子数组 (Maximum Subarray Deep Dive)
// Kadane算法, 分治, 前缀和</pre>
  <button onclick="runDemo()">运行演示</button>
  <div id="result"></div>
</div>
<script>
function runDemo(){function msa(nums){let ms=nums[0],cs=nums[0];for(let i=1;i<nums.length;i++){cs=Math.max(nums[i],cs+nums[i]);ms=Math.max(ms,cs)}return ms}document.getElementById('result').textContent='最大子数组: '+msa([-2,1,-3,4,-1,2,1,-5,4])+'\nKadane算法 O(n)'}
</script>
